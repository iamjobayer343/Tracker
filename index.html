<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Salah & Reading Tracker V2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<header>
    <h1>📿 Salah & Reading Tracker</h1>
    <p id="date"></p>
    <p id="streak"></p>
</header>

<!-- Dark Mode -->
<button id="darkBtn" onclick="toggleDark()">🌙 Dark Mode</button>

<h2>Salah</h2>
<div class="salah-list">
    <label><input type="checkbox" id="fajr"> Fajr</label>
    <label><input type="checkbox" id="dhuhr"> Dhuhr</label>
    <label><input type="checkbox" id="asr"> Asr</label>
    <label><input type="checkbox" id="maghrib"> Maghrib</label>
    <label><input type="checkbox" id="isha"> Isha</label>
</div>

<div class="progress-box">
    <div id="progress"></div>
</div>
<p id="progressText"></p>

<h2>Reading</h2>
<input type="number" id="pages" placeholder="Pages read today">
<button onclick="savePages()">Save Pages</button>
<p id="pageResult"></p>

<h2>⏱ Timer</h2>
<div class="timer"><span id="time">00:00</span></div>
<button onclick="startTimer()">Start</button>
<button onclick="stopTimer()">Stop</button>
<button onclick="resetTimer()">Reset</button>

<hr>

<h2>📅 History</h2>
<div id="historyBox"></div>

<hr>

<button class="reset" onclick="resetDay()">Reset Today</button>

</div>

<script src="script.js"></script>
</body>
</html>
